# NAT Tunnel 服务端配置

# 控制端口 - 客户端连接用
control_port: 7000

# 认证token - 客户端需要使用相同的token才能连接
# !! 请务必修改为自己的安全密钥 !!
auth_token: "change_me_to_a_secure_token"

# Web管理面板端口
web_port: 7500

# Web管理面板密码
# !! 请务必修改为自己的安全密码 !!
web_password: "admin123"

# 允许映射的端口范围 [最小, 最大]
allowed_ports: [10000, 60000]

# 每个客户端最大隧道数
max_tunnels_per_client: 10

# 心跳间隔(秒)
heartbeat_interval: 30

# 心跳超时(秒) - 超过此时间没有心跳将断开连接
heartbeat_timeout: 90

# ============================================================
# 手机端 VPN 配置（IKEv2/IPSec 内网穿透）
# 需先在服务器上运行 deploy/setup_vpn.sh 安装 StrongSwan
# ============================================================

# 服务器公网 IP 或域名（VPN客户端填写此地址）
server_host: "your_server_ip"

# IKEv2/IPSec MSCHAPv2 - 用户名密码认证（iOS/Android 内置支持）
vpn_ikev2_username: "vpnuser"
vpn_ikev2_password: "change_me_vpn_password"

# IPSec PSK（Cisco IPSec / 预共享密钥）- 兼容性最广
vpn_psk_secret: "change_me_psk_secret"
vpn_psk_username: "vpnuser"
vpn_psk_password: "change_me_psk_password"

# IPSec RSA - 证书认证（运行 setup_vpn.sh 自动生成证书后填写路径）
vpn_rsa_ca_cert: "/etc/ipsec.d/cacerts/ca.crt"
vpn_rsa_client_p12: "/etc/ipsec.d/private/client.p12"
